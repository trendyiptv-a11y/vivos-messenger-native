name: Build Android production AAB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-signed-aab:
    name: Build signed native VIVOS AAB
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      VIVOS_UPLOAD_KEYSTORE_BASE64: ${{ secrets.VIVOS_UPLOAD_KEYSTORE_BASE64 }}
      VIVOS_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.VIVOS_UPLOAD_KEYSTORE_PASSWORD }}
      VIVOS_UPLOAD_KEY_ALIAS: ${{ secrets.VIVOS_UPLOAD_KEY_ALIAS }}
      VIVOS_UPLOAD_KEY_PASSWORD: ${{ secrets.VIVOS_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      - name: Verify required project files and secrets
        run: |
          set -euo pipefail
          missing=0
          require_file() {
            if [ ! -f "$1" ]; then
              echo "Missing required file: $1"
              missing=1
            fi
          }
          require_secret() {
            name="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "Missing required GitHub secret: $name"
              missing=1
            else
              echo "Found GitHub secret: $name"
            fi
          }

          require_file app.json
          require_file google-services.json
          require_file assets/images/icon.png
          require_file assets/images/splash-icon.png
          require_secret EXPO_PUBLIC_SUPABASE_URL "$EXPO_PUBLIC_SUPABASE_URL"
          require_secret EXPO_PUBLIC_SUPABASE_ANON_KEY "$EXPO_PUBLIC_SUPABASE_ANON_KEY"
          require_secret VIVOS_UPLOAD_KEYSTORE_BASE64 "$VIVOS_UPLOAD_KEYSTORE_BASE64"
          require_secret VIVOS_UPLOAD_KEYSTORE_PASSWORD "$VIVOS_UPLOAD_KEYSTORE_PASSWORD"
          require_secret VIVOS_UPLOAD_KEY_ALIAS "$VIVOS_UPLOAD_KEY_ALIAS"
          require_secret VIVOS_UPLOAD_KEY_PASSWORD "$VIVOS_UPLOAD_KEY_PASSWORD"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Restore upload keystore
        run: |
          set -euo pipefail
          mkdir -p android/app/signing
          printf '%s' "$VIVOS_UPLOAD_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > android/app/signing/upload-keystore.jks
          test -s android/app/signing/upload-keystore.jks
          echo "Keystore restored: $(wc -c < android/app/signing/upload-keystore.jks) bytes"

      - name: Verify upload keystore and alias
        run: |
          set -euo pipefail
          keytool -list \
            -keystore android/app/signing/upload-keystore.jks \
            -storepass "$VIVOS_UPLOAD_KEYSTORE_PASSWORD" \
            -v > /tmp/vivos-keystore.txt

          grep -i -E "Alias name:|SHA256:|Creation date:" /tmp/vivos-keystore.txt

          if ! grep -F "Alias name: $VIVOS_UPLOAD_KEY_ALIAS" /tmp/vivos-keystore.txt >/dev/null; then
            echo "Expected VIVOS_UPLOAD_KEY_ALIAS was not found in restored keystore."
            echo "Check that VIVOS_UPLOAD_KEY_ALIAS matches the alias printed above."
            exit 1
          fi

      - name: Configure Android release signing
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs')
          const path = 'android/app/build.gradle'
          let text = fs.readFileSync(path, 'utf8')

          if (!text.includes('vivosUpload {')) {
            const signingBlock = /signingConfigs\s*\{[\s\S]*?debug\s*\{[\s\S]*?\n\s*\}/m
            if (!signingBlock.test(text)) {
              throw new Error('Could not find Android signingConfigs debug block')
            }

            text = text.replace(signingBlock, (match) => `${match}\n        vivosUpload {\n            storeFile file("signing/upload-keystore.jks")\n            storePassword System.getenv("VIVOS_UPLOAD_KEYSTORE_PASSWORD")\n            keyAlias System.getenv("VIVOS_UPLOAD_KEY_ALIAS")\n            keyPassword System.getenv("VIVOS_UPLOAD_KEY_PASSWORD")\n        }`)
          }

          text = text.replace(/release\s*\{([\s\S]*?)signingConfig\s+signingConfigs\.debug/m, 'release {$1signingConfig signingConfigs.vivosUpload')

          if (!text.includes('signingConfig signingConfigs.vivosUpload')) {
            throw new Error('Release signingConfig was not switched to vivosUpload')
          }

          fs.writeFileSync(path, text)
          NODE

      - name: Build signed release AAB
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean bundleRelease --stacktrace

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: vivos-messenger-release-aab-v0.1.15-code22
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
