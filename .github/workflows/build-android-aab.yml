name: Build Android production AAB

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
      wait:
        description: "Wait for EAS build to finish in GitHub logs"
        required: true
        default: true
        type: boolean

jobs:
  build-android-aab:
    name: Build Android App Bundle with EAS
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Inject Supabase env into selected EAS profile
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const profile = process.env.EAS_BUILD_PROFILE || 'production'
          const supabaseUrl = process.env.EXPO_PUBLIC_SUPABASE_URL || ''
          const supabaseAnonKey = process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY || ''

          if (!supabaseUrl || !supabaseAnonKey) {
            throw new Error('Missing EXPO_PUBLIC_SUPABASE_URL or EXPO_PUBLIC_SUPABASE_ANON_KEY GitHub secret')
          }

          const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'))
          eas.build = eas.build || {}
          eas.build[profile] = eas.build[profile] || {}
          eas.build[profile].env = {
            ...(eas.build[profile].env || {}),
            EXPO_PUBLIC_SUPABASE_URL: supabaseUrl,
            EXPO_PUBLIC_SUPABASE_ANON_KEY: supabaseAnonKey,
          }
          fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2))
          NODE
        env:
          EAS_BUILD_PROFILE: ${{ inputs.profile }}

      - name: Verify Expo project assets
        run: |
          test -f app.json
          test -f eas.json
          test -f google-services.json
          test -f assets/images/icon.png
          test -f assets/images/splash-icon.png

      - name: Build Android production AAB
        run: |
          if [ "${{ inputs.wait }}" = "true" ]; then
            eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --wait
          else
            eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --no-wait
          fi
