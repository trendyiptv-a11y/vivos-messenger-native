name: EAS Android Preview APK

on:
  workflow_dispatch:

jobs:
  build-android-preview:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Inject Supabase env into EAS profile
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'))
          eas.build = eas.build || {}
          eas.build.preview = eas.build.preview || {}
          eas.build.preview.env = {
            ...(eas.build.preview.env || {}),
            EXPO_PUBLIC_SUPABASE_URL: process.env.EXPO_PUBLIC_SUPABASE_URL || '',
            EXPO_PUBLIC_SUPABASE_ANON_KEY: process.env.EXPO_PUBLIC_SUPABASE_ANON_KEY || '',
          }
          fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2))
          NODE

      - name: Verify Expo image assets
        run: |
          test -f assets/images/icon.png
          test -f assets/images/adaptive-icon.png
          test -f assets/images/splash-icon.png
          test -f assets/images/logo.png
          file assets/images/icon.png
          file assets/images/adaptive-icon.png
          file assets/images/splash-icon.png
          file assets/images/logo.png

      - name: Link or create EAS project
        run: eas project:init --non-interactive --force

      - name: Build Android APK with EAS
        run: eas build --platform android --profile preview --non-interactive
