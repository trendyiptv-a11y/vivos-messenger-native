name: EAS Android Preview APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "types/**"
      - "assets/**"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "babel.config.js"
      - "tsconfig.json"
      - "index.js"
      - ".github/workflows/eas-android-preview.yml"

jobs:
  build-android-preview:
    name: Build Android preview APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Generate temporary Expo image assets
        run: |
          mkdir -p assets/images
          python3 - <<'PY'
          import struct, zlib
          from pathlib import Path

          def png(path, size, color):
              width = height = size
              r, g, b, a = color
              raw = b''.join(b'\x00' + bytes([r, g, b, a]) * width for _ in range(height))

              def chunk(kind, data):
                  return (
                      struct.pack('>I', len(data))
                      + kind
                      + data
                      + struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff)
                  )

              data = b'\x89PNG\r\n\x1a\n'
              data += chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0))
              data += chunk(b'IDAT', zlib.compress(raw, 9))
              data += chunk(b'IEND', b'')
              Path(path).write_bytes(data)

          png('assets/images/icon.png', 1024, (22, 56, 101, 255))
          png('assets/images/adaptive-icon.png', 1024, (22, 56, 101, 255))
          png('assets/images/splash-icon.png', 1024, (22, 56, 101, 255))
          PY
          file assets/images/icon.png

      - name: Link or create EAS project
        run: eas project:init --non-interactive --force

      - name: Build Android APK with EAS
        run: eas build --platform android --profile preview --non-interactive
