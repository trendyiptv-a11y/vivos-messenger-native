name: EAS iOS Simulator

on:
  workflow_dispatch:

jobs:
  build-ios-simulator:
    name: Build iOS Simulator with EAS
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_PUSH_API_URL: ${{ secrets.EXPO_PUBLIC_PUSH_API_URL }}
      EXPO_PUBLIC_PUSH_TEST_API_URL: ${{ secrets.EXPO_PUBLIC_PUSH_TEST_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check Expo and EAS versions
        run: |
          npx expo --version
          npx eas-cli@latest --version

      - name: Build iOS simulator
        run: npx eas-cli@latest build --platform ios --profile ios-simulator --non-interactive
