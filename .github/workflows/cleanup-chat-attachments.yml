name: Cleanup chat attachments

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup expired chat attachments
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cleanup expired attachments
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHAT_ATTACHMENTS_BUCKET: chat-attachments
          CHAT_ATTACHMENT_CLEANUP_BATCH_SIZE: 100
        run: node scripts/cleanup-expired-chat-attachments.mjs
